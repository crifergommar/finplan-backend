spring:
  application:
    name: finplan-backend
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-minimo-32-caracteres!!}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: com.finplan
  paths-to-match: /api/**

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/finplan_dev?createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.finplan: INFO
    org.springframework: INFO
    org.springframework.web.servlet.mvc.method: TRACE